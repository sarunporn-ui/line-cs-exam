<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบข้อเขียน LINE Ecosystem สำหรับทีม CS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary-color: #00B900; --bg-color: #f4f7f6; --text-color: #333; --card-bg: #fff; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        .essay-textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: 'Kanit', sans-serif; resize: vertical; font-size: 15px; }
        button { background-color: var(--primary-color); color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; transition: background 0.3s; font-weight: 500; font-family: 'Kanit', sans-serif; }
        button:hover { background-color: #009900; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .hidden { display: none !important; }
        .question-card { background: #fafafa; border-left: 5px solid var(--primary-color); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        #timer-display { position: sticky; top: 0; background: var(--card-bg); padding: 10px; text-align: right; font-size: 18px; font-weight: bold; color: #d35400; border-bottom: 2px solid #eee; z-index: 100; }
        .result-item { background: #fdfae3; padding: 15px; margin-bottom: 15px; border-left: 5px solid #f39c12; border-radius: 4px; page-break-inside: avoid; }
        .section-title { background: #2c3e50; color: white; padding: 10px; border-radius: 4px; margin-top: 30px; margin-bottom: 20px; }
        #btn-download { background-color: #2980b9; margin-top: 10px; }
        #btn-download:hover { background-color: #1a5276; }
        #btn-retake { background-color: #7f8c8d; margin-top: 10px; }
        #btn-retake:hover { background-color: #636e72; }

        @media print {
            body { background-color: #fff; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; padding: 0; margin: 0; }
            .btn-group, #timer-display { display: none !important; }
            .result-item { page-break-inside: avoid; border: 1px solid #ddd; }
        }
    </style>
</head>
<body>

<div class="container" id="screen-start">
    <h1>แบบทดสอบข้อเขียน</h1>
    <h2>LINE Ecosystem สำหรับทีม CS</h2>
    <div class="form-group">
        <label for="student-name">ชื่อ-นามสกุลผู้ทดสอบ:</label>
        <input type="text" id="student-name" placeholder="กรอกชื่อของคุณ" required>
    </div>
    <div class="form-group">
        <label for="test-date">วันที่ทดสอบ:</label>
        <input type="date" id="test-date" required>
    </div>
    <button onclick="startQuiz()">เริ่มทำข้อสอบ</button>
</div>

<div class="container hidden" id="screen-quiz">
    <div id="timer-display">เวลา: 00:00</div>
    <div id="quiz-container"></div>
    <button onclick="submitQuiz()" id="btn-submit">ส่งคำตอบ</button>
</div>

<div class="container hidden" id="screen-result">
    <div id="pdf-content">
        <h1 style="text-align: center;">ผลการทดสอบข้อเขียน</h1>
        <h3 id="result-summary"></h3>
        <hr style="margin-bottom: 20px;">
        <div id="essay-answers-container"></div>
    </div>
    
    <div class="btn-group">
        <button id="btn-download" onclick="window.print()">บันทึกเป็น PDF / ปริ้นผลสอบ</button>
        <button id="btn-retake" onclick="location.reload()">ทำแบบทดสอบใหม่</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxt1NS5wV7wq_LJ6mikb0tpr09Gjj_X5k5nybjvYgG4Wj14cXIMLNFZV4BBrO0YZcyF9A/exec'; 

    const essayQuestionsData = [
        { q: `1. ลูกค้าทักมาโวยวายว่าไม่มีคนตอบเลยจะใช้ข้อความด่วน เนื่องจากเราติดเรียน ไม่มีคนตอบลูกค้าเลยผ่านมา 4 ชั่วโมงแล้ว ลูกค้าหงุดหงิดแล้วพิมพ์มาด่าว่าทำงานกันยังไง ทำไมไม่มีคนอยู่หน้างานเลย เราจะพิมพ์ตอบและให้ทำไงให้ลูกค้าสงบลง` },
        { q: `2. ในกลุ่ม LINE OA ลูกค้า มีคนดูแลหลายฝ่าย ลูกค้าทักมาบอกให้ซื้อแพ็คเกจ OA พอซื้อเสร็จลูกค้าทักมาบอกว่า ไม่สามารถ Broadcast ได้ เคสนี้เกิดอะไรขึ้น` },
        { q: `3. เราเป็นพาร์ทเนอร์กับเอเจนซี่เจ้าหนึ่ง เค้าไปขายลูกค้าภาครัฐในปีที่ 1 เป็นการซื้อแพ็คเกจ Pro พร้อมทั้งข้อความทั้งหมด 12 เดือน และมีข้อความคงเหลือทบมาให้ในปีถัดไป แต่เอเจนซี่เจ้านั้นไปขายงานในเรทราคาเดิม โดยไม่รู้ว่า LINE มีขึ้นราคา เราจะช่วยแนะนำเค้ายังไงได้บ้าง เพื่อให้เค้าได้ในราคาเดิม` },
        { q: `4. เวลาที่เราได้รับลูกค้าใหม่จาก MD สิ่งที่เราต้องถามกับลูกค้าหรือต้องรู้คืออะไรบ้าง` },
        { q: `5. ถ้าลูกค้าส่งราคาของอีกเจ้ามาให้ดูว่าราคาถูกกว่าและมีแถมข้อความด้วย เราจะแจ้งลูกค้ายังไง` },
        { q: `6. Account ลูกค้าที่อยู่กับเราโดน Hack เราจะทำอย่างไรกับสถานการณ์นี้` },
        { q: `7. ลูกค้าโอนเงินมาเกิน คุณจะทำอะไรกับเคสนี้` },
        { q: `8. ลูกค้าซื้อแพ็กเกจรายปีราคาหลายหมื่นบาท แล้วพยายามขอ "แถม Premium ID ฟรีได้ไหม" หรือ "ขอลดราคาเพิ่มอีก 10% ไม่งั้นจะไปซื้อกับเจ้าอื่น"` },
        { q: `9. ลูกค้าแจ้งว่า "มีแอดมินคนเก่าแอบลบข้อมูลลูกค้าและเตะทุกคนออกจากกลุ่ม LINE OA" และมาขอให้เรากู้ข้อมูลคืนให้ คุณมีขอบเขตอำนาจแค่ไหนในการช่วย? และคุณจะแนะนำขั้นตอนความปลอดภัยในการจัดการสิทธิ์แอดมินให้เขาอย่างไร` },
        { q: `10. ลูกค้าบรอดแคสต์ข้อความขายของรัวๆ จนโดน LINE จำกัดสิทธิ์การส่ง (ชั่วคราว) ลูกค้าทักมาด่าว่า "ทำไมส่งไม่ได้! ทั้งที่ซื้อแพ็กเกจแล้ว" เราจะทำยังไงกับสถานการณ์นี้` },
        { q: `11. ลูกค้าบ่นว่า "LINE OA แพงจัง ไปใช้ Facebook Messenger หรือ TikTok ดีกว่า ไม่เสียค่าส่งรายข้อความด้วย" เราจะทำยังไงกับลูกค้ารายนี้` },
        { q: `12. ถ้าคุณแจ้งว่า เติมข้อความให้ลูกค้าแล้ว แต่จริงๆแล้วคุณไม่ได้เติมให้เค้า คุณจะแก้ไขเหตุการณ์นี้ยังไง` },
        { q: `13. กรณีที่เราไม่ได้ไปปรับหลังบ้านลูกค้าเป็น Free และ LINE คิดเงินเราในเดือนถัดไป เราจะทำยังไง` },
        { q: `14. ลูกค้าทักมาตามงานว่า "น้องที่คุยเมื่อวานบอกจะเช็กเรื่องยอดเงินโอนซ้ำให้ พี่รอมาทั้งวันแล้วยังไม่มีใครทักมาเลย สรุปยังไงคะ" คุณจะทำยังไง` },
        { q: `15. มีเคสที่ยังแก้ไม่จบ (Pending) ค้างอยู่ในโน้ตนานกว่า 1 สัปดาห์ เพราะคุณมัวแต่ไปสนใจเคสใหม่ๆ ที่ทักเข้ามา คุณจะเขียนข้อความทักไปหาลูกค้าอย่างไรไม่ให้ดูเหมือนว่าเราเพิ่งนึกได้ และแสดงให้เห็นว่าเรายังคงติดตามเรื่องให้เขาอยู่ตลอด?` },
        { q: `16. ถ้าลูกค้าถามว่ามี Promotion พิเศษไหมคะ จะตอบยังไง` }
    ];
    
    let timerInterval;
    let secondsElapsed = 0;
    let userName = "";
    let testDateStr = "";
    let essayAnswersData = [];

    document.getElementById('test-date').valueAsDate = new Date();

    function formatTime(totalSeconds) {
        const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const s = (totalSeconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function startQuiz() {
        userName = document.getElementById('student-name').value.trim();
        testDateStr = document.getElementById('test-date').value;
        if(!userName) { alert('กรุณากรอกชื่อ-นามสกุลก่อนเริ่มทำข้อสอบ'); return; }

        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        renderQuestions();

        timerInterval = setInterval(() => {
            secondsElapsed++;
            document.getElementById('timer-display').innerText = `เวลา: ${formatTime(secondsElapsed)}`;
        }, 1000);
    }

    function renderQuestions() {
        const container = document.getElementById('quiz-container');
        let html = '<h3 class="section-title">ข้อสอบข้อเขียน (กรุณาพิมพ์คำตอบ)</h3>';
        
        essayQuestionsData.forEach((item, index) => {
            html += `<div class="question-card">
                <p><strong>ข้อที่ ${index + 1}:</strong> ${item.q}</p>
                <textarea id="essay-q${index}" class="essay-textarea" placeholder="พิมพ์คำตอบของคุณที่นี่..."></textarea>
            </div>`;
        });
        container.innerHTML = html;
    }

    function submitQuiz() {
        if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการส่งคำตอบ?')) return;
        clearInterval(timerInterval);
        
        essayAnswersData = [];
        essayQuestionsData.forEach((item, index) => {
            const answerText = document.getElementById(`essay-q${index}`).value.trim();
            essayAnswersData.push({ qNum: index + 1, question: item.q, userAns: answerText || "ไม่ได้ตอบ" });
        });

        showResultScreen();
        sendDataToSheet();
    }

    function showResultScreen() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        document.getElementById('result-summary').innerHTML = `
            ชื่อผู้สอบ: ${userName}<br>
            วันที่สอบ: ${testDateStr}<br>
            ใช้เวลาไป: ${formatTime(secondsElapsed)} นาที
        `;

        const essayContainer = document.getElementById('essay-answers-container');
        let html = `<h3 style="margin-top: 20px;">รายการคำตอบของคุณ:</h3>`;
        essayAnswersData.forEach(item => {
            html += `<div class="result-item"><p><strong>ข้อที่ ${item.qNum}:</strong> ${item.question}</p>
                <p>📝 <strong>คำตอบ:</strong><br><span style="white-space: pre-wrap; display: block; padding-top: 10px; color: #333;">${item.userAns}</span></p></div>`;
        });
        essayContainer.innerHTML = html;
    }

    function sendDataToSheet() {
        if (!scriptURL) return;

        let essayDetailsText = essayAnswersData.map(item => `${item.question}\n- ตอบ: ${item.userAns}`).join('\n\n');

        const payload = new URLSearchParams();
        payload.append("name", userName);
        payload.append("date", testDateStr);
        payload.append("essays", essayDetailsText);

        const retakeBtn = document.getElementById('btn-retake');
        retakeBtn.disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: payload.toString()
        }).finally(() => { retakeBtn.disabled = false; });
    }
</script>
</body>
</html>
