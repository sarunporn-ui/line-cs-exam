<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบ LINE Ecosystem สำหรับทีม CS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary-color: #00B900; --bg-color: #f4f7f6; --text-color: #333; --card-bg: #fff; }
        body { font-family: 'Kanit', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input[type="text"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        .essay-textarea { width: 100%; height: 120px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: 'Kanit', sans-serif; resize: vertical; font-size: 15px; }
        button { background-color: var(--primary-color); color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; transition: background 0.3s; font-weight: 500; font-family: 'Kanit', sans-serif; }
        button:hover { background-color: #009900; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .hidden { display: none !important; }
        .question-card { background: #fafafa; border-left: 5px solid var(--primary-color); padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .choice-label { display: block; padding: 10px; background: #fff; border: 1px solid #eee; margin-bottom: 8px; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .choice-label:hover { background: #eefbee; }
        input[type="radio"] { margin-right: 10px; }
        #timer-display { position: sticky; top: 0; background: var(--card-bg); padding: 10px; text-align: right; font-size: 18px; font-weight: bold; color: #d35400; border-bottom: 2px solid #eee; z-index: 100; }
        .result-item { background: #ffeaea; padding: 15px; margin-bottom: 15px; border-left: 5px solid #e74c3c; border-radius: 4px; page-break-inside: avoid; }
        .essay-result { background: #fdfae3; border-left: 5px solid #f39c12; }
        .correct-ans { color: #27ae60; font-weight: bold; margin-top: 10px; }
        .explanation { background: #fff; padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 14px;}
        .section-title { background: #2c3e50; color: white; padding: 10px; border-radius: 4px; margin-top: 30px; }
        .btn-group button { margin-top: 10px; }
        #btn-download { background-color: #2980b9; }
        #btn-download:hover { background-color: #1a5276; }
        #btn-retake { background-color: #7f8c8d; }
        #btn-retake:hover { background-color: #636e72; }

        /* จัดหน้ากระดาษสำหรับเวลาปริ้น PDF ให้ออกมาสวยงามและไม่ขาด */
        @media print {
            body { background-color: #fff; padding: 0; }
            .container { box-shadow: none; border: none; max-width: 100%; padding: 0; margin: 0; }
            .btn-group, #timer-display { display: none !important; }
            .result-item, .question-card { page-break-inside: avoid; border: 1px solid #ddd; }
            h1, h2, h3, .section-title { page-break-after: avoid; }
        }
    </style>
</head>
<body>

<div class="container" id="screen-start">
    <h1>แบบทดสอบทักษะ LINE Ecosystem</h1>
    <h2>สำหรับทีม Customer Service</h2>
    <div class="form-group">
        <label for="student-name">ชื่อ-นามสกุลผู้ทดสอบ:</label>
        <input type="text" id="student-name" placeholder="กรอกชื่อของคุณ" required>
    </div>
    <div class="form-group">
        <label for="test-date">วันที่ทดสอบ:</label>
        <input type="date" id="test-date" required>
    </div>
    <button onclick="startQuiz()">เริ่มทำข้อสอบ</button>
</div>

<div class="container hidden" id="screen-quiz">
    <div id="timer-display">เวลา: 00:00</div>
    <div id="quiz-container"></div>
    <button onclick="submitQuiz()" id="btn-submit">ส่งคำตอบ</button>
</div>

<div class="container hidden" id="screen-result">
    <div id="pdf-content">
        <h1 style="text-align: center;">ผลการทดสอบ LINE Ecosystem</h1>
        <h3 id="result-summary"></h3>
        <hr style="margin-bottom: 20px;">
        <div id="wrong-answers-container"></div>
        <div id="essay-answers-container"></div>
    </div>
    
    <div class="btn-group">
        <button id="btn-download" onclick="window.print()">บันทึกเป็น PDF / ปริ้นผลสอบ</button>
        <button id="btn-retake" onclick="location.reload()">ทำแบบทดสอบอีกครั้ง</button>
    </div>
</div>

<script>
    // URL ของ Google Sheets (ใส่ให้เรียบร้อยแล้ว)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxt1NS5wV7wq_LJ6mikb0tpr09Gjj_X5k5nybjvYgG4Wj14cXIMLNFZV4BBrO0YZcyF9A/exec'; 

    // ข้อสอบอัตนัย 16 ข้อ
    const essayQuestionsData = [
        { q: `1. ลูกค้าทักมาโวยวายว่าไม่มีคนตอบเลยจะใช้ข้อความด่วน เนื่องจากเราติดเรียน ไม่มีคนตอบลูกค้าเลยผ่านมา 4 ชั่วโมงแล้ว ลูกค้าหงุดหงิดแล้วพิมพ์มาด่าว่าทำงานกันยังไง ทำไมไม่มีคนอยู่หน้างานเลย เราจะพิมพ์ตอบและให้ทำไงให้ลูกค้าสงบลง` },
        { q: `2. ในกลุ่ม LINE OA ลูกค้า มีคนดูแลหลายฝ่าย ลูกค้าทักมาบอกให้ซื้อแพ็คเกจ OA พอซื้อเสร็จลูกค้าทักมาบอกว่า ไม่สามารถ Broadcast ได้ เคสนี้เกิดอะไรขึ้น` },
        { q: `3. เราเป็นพาร์ทเนอร์กับเอเจนซี่เจ้าหนึ่ง เค้าไปขายลูกค้าภาครัฐในปีที่ 1 เป็นการซื้อแพ็คเกจ Pro พร้อมทั้งข้อความทั้งหมด 12 เดือน และมีข้อความคงเหลือทบมาให้ในปีถัดไป แต่เอเจนซี่เจ้านั้นไปขายงานในเรทราคาเดิม โดยไม่รู้ว่า LINE มีขึ้นราคา เราจะช่วยแนะนำเค้ายังไงได้บ้าง เพื่อให้เค้าได้ในราคาเดิม` },
        { q: `4. เวลาที่เราได้รับลูกค้าใหม่จาก MD สิ่งที่เราต้องถามกับลูกค้าหรือต้องรู้คืออะไรบ้าง` },
        { q: `5. ถ้าลูกค้าส่งราคาของอีกเจ้ามาให้ดูว่าราคาถูกกว่าและมีแถมข้อความด้วย เราจะแจ้งลูกค้ายังไง` },
        { q: `6. Account ลูกค้าที่อยู่กับเราโดน Hack เราจะทำอย่างไรกับสถานการณ์นี้` },
        { q: `7. ลูกค้าโอนเงินมาเกิน คุณจะทำอะไรกับเคสนี้` },
        { q: `8. ลูกค้าซื้อแพ็กเกจรายปีราคาหลายหมื่นบาท แล้วพยายามขอ "แถม Premium ID ฟรีได้ไหม" หรือ "ขอลดราคาเพิ่มอีก 10% ไม่งั้นจะไปซื้อกับเจ้าอื่น"` },
        { q: `9. ลูกค้าแจ้งว่า "มีแอดมินคนเก่าแอบลบข้อมูลลูกค้าและเตะทุกคนออกจากกลุ่ม LINE OA" และมาขอให้เรากู้ข้อมูลคืนให้ คุณมีขอบเขตอำนาจแค่ไหนในการช่วย? และคุณจะแนะนำขั้นตอนความปลอดภัยในการจัดการสิทธิ์แอดมินให้เขาอย่างไร` },
        { q: `10. ลูกค้าบรอดแคสต์ข้อความขายของรัวๆ จนโดน LINE จำกัดสิทธิ์การส่ง (ชั่วคราว) ลูกค้าทักมาด่าว่า "ทำไมส่งไม่ได้! ทั้งที่ซื้อแพ็กเกจแล้ว" เราจะทำยังไงกับสถานการณ์นี้` },
        { q: `11. ลูกค้าบ่นว่า "LINE OA แพงจัง ไปใช้ Facebook Messenger หรือ TikTok ดีกว่า ไม่เสียค่าส่งรายข้อความด้วย" เราจะทำยังไงกับลูกค้ารายนี้` },
        { q: `12. ถ้าคุณแจ้งว่า เติมข้อความให้ลูกค้าแล้ว แต่จริงๆแล้วคุณไม่ได้เติมให้เค้า คุณจะแก้ไขเหตุการณ์นี้ยังไง` },
        { q: `13. กรณีที่เราไม่ได้ไปปรับหลังบ้านลูกค้าเป็น Free และ LINE คิดเงินเราในเดือนถัดไป เราจะทำยังไง` },
        { q: `14. ลูกค้าทักมาตามงานว่า "น้องที่คุยเมื่อวานบอกจะเช็กเรื่องยอดเงินโอนซ้ำให้ พี่รอมาทั้งวันแล้วยังไม่มีใครทักมาเลย สรุปยังไงคะ" คุณจะทำยังไง` },
        { q: `15. มีเคสที่ยังแก้ไม่จบ (Pending) ค้างอยู่ในโน้ตนานกว่า 1 สัปดาห์ เพราะคุณมัวแต่ไปสนใจเคสใหม่ๆ ที่ทักเข้ามา คุณจะเขียนข้อความทักไปหาลูกค้าอย่างไรไม่ให้ดูเหมือนว่าเราเพิ่งนึกได้ และแสดงให้เห็นว่าเรายังคงติดตามเรื่องให้เขาอยู่ตลอด?` },
        { q: `16. ถ้าลูกค้าถามว่ามี Promotion พิเศษไหมคะ จะตอบยังไง` }
    ];

    // ข้อสอบปรนัย 29 ข้อ
    const questionsData = [
        { q: "คลินิกศัลยกรรมความงามแห่งหนึ่งต้องการใช้ฟีเจอร์ AI Chatbot (Beta) เพื่อช่วยตอบคำถามลูกค้าเกี่ยวกับราคาประเมินเบื้องต้นและรีวิวการทำศัลยกรรม แผนการนี้สามารถดำเนินการได้หรือไม่?", choices: { "ก": "ทำได้ หากมีการป้อนข้อมูล PDF ที่มีเนื้อหาครบถ้วนให้ AI เรียนรู้", "ข": "ทำได้ แต่ต้องให้แอดมินเข้ามาตรวจสอบความถูกต้องของคำตอบ AI ทุกครั้ง", "ค": "ทำไม่ได้ เนื่องจากธุรกิจการแพทย์และสุขภาพเป็นกลุ่มธุรกิจที่ถูกจำกัดสิทธิ์การใช้งานฟีเจอร์นี้", "ง": "ทำไม่ได้ เพราะ AI Chatbot ไม่สามารถอ่านไฟล์ที่มีรูปภาพรีวิวได้" }, ans: "ค", exp: "ธุรกิจกลุ่มการแพทย์/สุขภาพ การเงิน ศาสนา และการเมือง ไม่สามารถใช้งาน AI Chatbot (Beta) ได้เนื่องจากนโยบายข้อจำกัดด้านข้อมูลอ่อนไหว" },
        { q: "ลูกค้าพิมพ์เข้ามาว่า 'สนใจโปรโมชั่นเดือนนี้ค่ะ' ซึ่งในระบบร้านค้ามีการตั้งค่า 'ข้อความตอบกลับอัตโนมัติ (Keyword Reply)' คำว่า 'โปรโมชั่น' เอาไว้ และในขณะเดียวกันร้านก็เปิดใช้งาน 'AI Chatbot' ที่มีข้อมูลโปรโมชั่นอยู่ด้วย ระบบจะเลือกตอบลูกค้าอย่างไร?", choices: { "ก": "ระบบจะส่งทั้งสองข้อความพร้อมกันเพื่อให้ลูกค้าเลือกอ่าน", "ข": "AI Chatbot จะเป็นผู้ตอบ เพราะมีความฉลาดในการวิเคราะห์บริบทมากกว่า", "ค": "ข้อความตอบกลับอัตโนมัติ (Auto Response) จะทำงานก่อน เพราะระบบจะให้ความสำคัญกับคีย์เวิร์ดที่ตั้งไว้เป๊ะๆ เป็นอันดับ 1", "ง": "ระบบจะสุ่มเลือกคำตอบใดคำตอบหนึ่งเพื่อไม่ให้ลูกค้าสับสน" }, ans: "ค", exp: "ลำดับการทำงานของระบบคือ 1. Auto Response > 2. AI Chatbot > 3. Manual" },
        { q: "ร้านขายเสื้อผ้าต้องการนำคู่มือไซส์และรายละเอียดเนื้อผ้าไปให้ AI Chatbot เรียนรู้ แต่ผู้จัดการกังวลว่าข้อมูลความลับของร้านจะถูกนำไปสอน AI ของร้านคู่แข่งด้วย ความกังวลนี้ถูกต้องหรือไม่?", choices: { "ก": "ถูกต้อง ข้อมูลทั้งหมดจะถูกนำไปฝึกฝน AI ในระดับ Global", "ข": "ถูกต้องบางส่วน ข้อมูลจะแชร์เฉพาะในกลุ่มธุรกิจประเภทเสื้อผ้าเหมือนกัน", "ค": "ไม่ถูกต้อง ข้อมูลที่อัปโหลดจะถูกใช้สอนเฉพาะบอทของร้านคุณเท่านั้น และไม่มีการนำไปใช้ใน Global Training", "ง": "ไม่ถูกต้อง เพราะ AI ไม่ได้จำข้อมูล แต่ใช้วิธีค้นหาจากอินเทอร์เน็ตมาตอบ" }, ans: "ค", exp: "LINE ยืนยันว่าข้อมูลของร้านจะถูกรักษาเป็นความลับและไม่นำไปฝึกฝน AI ส่วนกลาง" },
        { q: "ผู้จัดการต้องการให้ทีมแอดมินตอบแชทด้วยตัวเองในช่วงเวลา 09.00-18.00 น. และให้ AI Chatbot ช่วยตอบและวิเคราะห์คำถามลูกค้าในช่วงกลางคืน แอดมินควรตั้งค่าระบบอย่างไรจึงจะถูกต้องที่สุด?", choices: { "ก": "ตั้งค่าเวลาทำการ (Working hours) และเลือกวิธีตอบนอกเวลาทำการเป็น AI Chatbot (Beta)", "ข": "ปิดเครื่องมือแชทแมนนวลตอน 18.00 น. แล้วให้แอดมินกดเปิดโหมด AI Chatbot ทุกวันก่อนเลิกงาน", "ค": "ตั้งค่าสเต็ปเมสเสจ (Step Message) ให้ส่งข้อมูล AI ไปหาลูกค้าที่ทักมาตอนกลางคืน", "ง": "สร้าง Custom Filter แยกแชทกลางคืนให้ AI จัดการ" }, ans: "ก", exp: "การตั้งค่า Business Hours จะช่วยสลับโหมดระหว่างแอดมิน (แมนนวล) กับ AI Chatbot ได้อย่างอัตโนมัติ" },
        { q: "ร้านอาหารต้องการใช้ AI Chatbot แนะนำเมนูอาหาร วิธีการใดคือวิธี 'สร้างสมอง' (เพิ่มข้อมูล) ให้ AI ที่รวดเร็วและตรงตามเงื่อนไขการทำงานของระบบมากที่สุด?", choices: { "ก": "ให้แอดมินพิมพ์เมนูอาหารทั้งหมดส่งเข้าไปในแชทของตัวเองเพื่อสอน AI", "ข": "นำลิงก์เว็บไซต์ของร้านไปแปะในระบบให้ AI อ่านเอง", "ค": "อัปโหลดไฟล์โบรชัวร์เมนูอาหาร หรือพิมพ์ชุดคำถาม-คำตอบ (Q&A) ลงไปในเมนูการตั้งค่าโดยตรง", "ง": "นำไฟล์วิดีโอแนะนำร้านไปให้ AI สแกน" }, ans: "ค", exp: "ระบบรองรับการสร้างข้อมูลจากไฟล์เอกสาร (PDF/รูปภาพ) หรือการสร้างชุดข้อความถาม-ตอบ เพื่อให้ AI เรียนรู้บริบท" },
        { q: "แอดมินดูแลลูกค้าโปรเจกต์ใหญ่และจำเป็นต้องสร้างฟิลเตอร์ (Custom Filter) เพื่อจัดกลุ่มแชทตามแท็ก เช่น 'ลูกค้ารอส่ง', 'ลูกค้า VIP', 'ลูกค้าขอใบกำกับภาษี' หากแอดมินสร้างฟิลเตอร์ไปแล้ว 20 ฟิลเตอร์ แต่ต้องการสร้างฟิลเตอร์ที่ 21 แอดมินควรแก้ปัญหาอย่างไร?", choices: { "ก": "ซื้อแพ็กเกจ OA Chat เพิ่มเพื่อขยายลิมิต", "ข": "แอดมินต้องพิจารณาลบหรือยุบรวมฟิลเตอร์เก่าที่ไม่ได้ใช้งานแล้ว เนื่องจากระบบจำกัดการสร้าง Custom Filter ไว้ที่ 20 ฟิลเตอร์ต่อบัญชี", "ค": "เปลี่ยนไปใช้บัญชี LINE ส่วนตัวในการสร้างฟิลเตอร์แทน", "ง": "ลบแท็ก (Chat Tag) ออกให้หมดเพื่อให้พื้นที่ฟิลเตอร์ว่าง" }, ans: "ข", exp: "Custom Filter มีลิมิตสร้างได้ 20 รายการต่อ 1 บัญชี OA" },
        { q: "ลูกค้าท่านหนึ่งมีการประสานงานหลายฝ่าย แอดมิน A จึงตั้งแท็กไว้ที่แชทลูกค้ารายนี้ถึง 30 แท็ก เมื่อแอดมิน B จะเพิ่มแท็กที่ 31 ระบบไม่บันทึกให้ ปัญหานี้เกิดจากอะไร?", choices: { "ก": "ลูกค้าบล็อก LINE OA ไปแล้ว", "ข": "แอดมิน B ไม่มีสิทธิ์เป็นผู้จัดการบัญชี", "ค": "ระบบมีข้อจำกัดให้ 1 ห้องแชทสามารถติดแท็กได้สูงสุด 30 แท็กเท่านั้น", "ง": "ระบบจำกัดให้ใช้แท็กได้แค่ 5 แท็กต่อห้องแชท" }, ans: "ค", exp: "OA Chat Package ขยายลิมิตให้สร้างได้ 300 แท็ก แต่การใช้งานจริงต่อ 1 ห้องแชทจะติดได้สูงสุด 30 แท็ก" },
        { q: "ทีมเซลส์ใช้ Note (โน้ต) ในห้องแชทเพื่อบันทึกประวัติการแพ้ส่วนผสมของลูกค้าอย่างละเอียด วันหนึ่งเซลส์ต้องการหาโน้ตเก่าที่เคยจดไว้เมื่อ 2 ปีที่แล้วเกี่ยวกับการแพ้ยาของลูกค้ารายนี้ เซลส์จะสามารถเข้าถึงข้อมูลนั้นได้หรือไม่ หากใช้แพ็กเกจ OA Chat?", choices: { "ก": "ไม่ได้ เพราะโน้ตจะถูกลบทิ้งอัตโนมัติทุกๆ 1 ปี", "ข": "ไม่ได้ เพราะระบบจำกัดให้เก็บโน้ตได้แค่ 100 โน้ต โน้ตเก่าสุดจะถูกดันหายไป", "ค": "ได้ เพราะระบบเก็บประวัติแชทและข้อมูลต่างๆ ได้นานสูงสุด 5 ปี (นับจาก 1 ม.ค. 2567 เป็นต้นไป) และรองรับโน้ตถึง 1,000 โน้ตต่อแชท", "ง": "ได้ แต่ต้องกดดาวน์โหลดประวัติแชทออกมาเป็น Excel เท่านั้นจึงจะเห็นโน้ต" }, ans: "ค", exp: "แพ็กเกจขยายลิมิตการเก็บประวัติเป็น 5 ปี และรองรับ 1,000 โน้ตต่อห้องแชท" },
        { q: "ลูกค้า walk-in มาหน้าร้านและต้องการสะสมแต้ม แต่แจ้งว่า 'รีบมาก ยังไม่สะดวกกดสมัครสมาชิกในมือถือตอนนี้' พนักงานควรแก้ปัญหานี้ด้วยระบบ MyCustomer อย่างไรให้ลูกค้าประทับใจ?", choices: { "ก": "แจ้งลูกค้าว่าต้องสมัครผ่าน LINE เท่านั้น ไม่งั้นแต้มจะสูญเปล่า", "ข": "ใช้ฟีเจอร์ 'เพิ่มพอยท์ด้วยเบอร์โทรศัพท์' เพื่อดองพอยท์ไว้ในเบอร์นั้น (สถานะ Non-member) ลูกค้าสามารถไปกดสมัครสมาชิกผูกกับไลน์ภายหลังเพื่อใช้แต้มได้", "ค": "ขอบัตรประชาชนลูกค้ามาสแกนเข้าระบบ", "ง": "ใช้ฟีเจอร์แจกคูปองแบบ Custom Code พิมพ์ใส่กระดาษให้ลูกค้าแทน" }, ans: "ข", exp: "ระบบสามารถให้พอยท์ผูกกับเบอร์โทรศัพท์ได้ล่วงหน้า ช่วยลดเวลาหน้าร้าน" },
        { q: "ร้านค้าต้องการแจกส่วนลดให้ลูกค้าที่ซื้อใน Shopee นำมาใช้ โดยต้องการสร้างรหัส 'SHP2025' เพื่อให้ลูกค้านำไปกรอกรับสิทธิ์ แอดมินต้องตั้งค่าของรางวัลเป็นประเภทใด?", choices: { "ก": "คูปอง > รหัสอัตโนมัติ", "ข": "คูปอง > รหัสกำหนดเอง (Custom Code)", "ค": "ของรางวัล > จัดส่งไปยังสมาชิก", "ง": "สิทธิ์พิเศษ > กิจกรรมพิเศษ" }, ans: "ข", exp: "รหัสกำหนดเอง ร้านค้าตั้งคำว่า SHP2025 ได้เองและลูกค้านำไปพิมพ์แชร์กันใช้ต่อได้ เหมาะกับแคมเปญ Marketplace" },
        { q: "แอดมินต้องการตั้งคำถามตอนลูกค้าสมัครสมาชิกว่า 'สภาพผิวของคุณเป็นแบบใด' เพื่อนำข้อมูลไปยิงบรอดแคสต์ขายสกินแคร์ แอดมินควรตั้งค่าคำถามนี้ให้ทำงานร่วมกับอะไรจึงจะมีประสิทธิภาพที่สุด?", choices: { "ก": "โน้ต (Note)", "ข": "แท็ก (Tag) โดยผูกคำตอบ 'ผิวมัน', 'ผิวแห้ง' เข้ากับแท็ก เพื่อให้ระบบจัดกลุ่มอัตโนมัติเมื่อลูกค้ากดเลือก", "ค": "ฟิลเตอร์ที่กำหนดเอง (Custom Filter)", "ง": "ริชเมนู (Rich Menu)" }, ans: "ข", exp: "การผูกคำถามกับ Tag ในหน้าสมัครสมาชิก เป็นการทำ Automated Segmentation ที่ดีที่สุด" },
        { q: "ลูกค้าแจ้งเปลี่ยนเบอร์โทรศัพท์ที่ใช้ผูกกับบัญชีสมาชิก แอดมินควรจัดการปัญหานี้อย่างไร?", choices: { "ก": "แอดมินต้องเป็นคนเข้าหลังบ้านไปแก้เบอร์ให้ลูกค้าเท่านั้น", "ข": "ให้ลูกค้าบล็อกไลน์แล้วแอดใหม่", "ค": "แนะนำให้ลูกค้ากดที่ริชเมนูเข้าหน้า Profile ตัวเอง แล้วไปที่ 'ข้อมูลส่วนตัว' เพื่อแก้ไขเบอร์โทรศัพท์ด้วยตัวเองได้เลย", "ง": "แจ้งลูกค้าว่าเบอร์โทรศัพท์ไม่สามารถเปลี่ยนได้ตลอดชีพ" }, ans: "ค", exp: "ระบบอนุญาตให้ลูกค้า Self-service ในการแก้ไขข้อมูลส่วนตัวพื้นฐานได้" },
        { q: "ลูกค้าทักไลน์มาต่อว่าเรื่องสินค้ามีตำหนิ แอดมินแก้ไขปัญหาเรียบร้อยแล้วและต้องการตรวจสอบว่าลูกค้ารายนี้เคยได้รับการบริการจากพนักงานคนไหนมาก่อน แอดมินสามารถดูจากประวัติส่วนใดได้ชัดเจนที่สุด?", choices: { "ก": "ฟิลเตอร์ที่กำหนดเอง", "ข": "เลื่อนอ่านในแชท และตรวจสอบ Note ที่แอดมินคนก่อนๆ พิมพ์ทิ้งไว้", "ค": "เช็กในแดชบอร์ด LINE Ads", "ง": "เช็กในหน้ารวมบรอดแคสต์" }, ans: "ข", exp: "Note เป็นฟีเจอร์หลักในการทำ Handoff เคสระหว่างแอดมิน เพื่อส่งต่อข้อมูลและบริบทของลูกค้า" },
        { q: "ร้านค้าต้องการทำปุ่มบนริชเมนูให้เป็น 'ทางลัด' ไปยังหน้าเช็กพอยท์ของลูกค้า แอดมินต้องนำลิงก์ (URL) จากระบบใดไปแปะที่ป้ายแอ็กชันบนหน้าตั้งค่าริชเมนู?", choices: { "ก": "ลิงก์เว็บไซต์บริษัท", "ข": "ลิงก์จากหน้า MyCustomer (ส่วนแบ่งปันลิงก์หน้าสมาชิก) ไปใส่ในแอ็กชันประเภท 'ลิงก์' บนริชเมนู", "ค": "ลิงก์จาก LINE Ads", "ง": "ลิงก์หน้า Facebook ของร้าน" }, ans: "ข", exp: "การประยุกต์ใช้ริชเมนูเป็นประตูเชื่อมเข้าสู่ระบบ CRM อย่างไร้รอยต่อ" },
        { q: "หากแอดมินต้องการให้ระบบ MyCustomer จ่ายพอยท์ลูกค้าอัตโนมัติเมื่อมีการสั่งซื้อของผ่าน MyShop แอดมินต้องตั้งค่าอย่างไร?", choices: { "ก": "ให้ลูกค้าแคปรูปสลิปมาแลกพอยท์", "ข": "แอดมินต้องเข้าไปที่ 'เชื่อมต่อร้านค้า' และตั้งค่าให้ MyCustomer ซิงค์ข้อมูลออร์เดอร์จาก MyShop พร้อมตั้งเงื่อนไขอัตราการจ่ายพอยท์แบบ 'อัตโนมัติ'", "ค": "ไม่สามารถทำได้ MyShop กับ MyCustomer แยกกันเด็ดขาด", "ง": "จ้างโปรแกรมเมอร์มาเขียน API เชื่อมต่อ" }, ans: "ข", exp: "ระบบมี Integration สำเร็จรูป ช่วยอำนวยความสะดวกในการทำ Automated Loyalty Program" },
        { q: "การนำ 'Chat Tag' ไปประยุกต์ใช้เพื่อเพิ่มยอดขายที่ทรงพลังที่สุดคือการทำอะไร?", choices: { "ก": "เอาไว้ตั้งชื่อเล่นให้ลูกค้าเฉยๆ", "ข": "นำ Tag ที่แบ่งพฤติกรรมลูกค้า ไปใช้เป็นเงื่อนไขในการทำ Targeted Broadcast นำเสนอสินค้าได้ตรงใจแต่ละกลุ่ม", "ค": "ทำให้ปุ่มริชเมนูเปลี่ยนสีได้", "ง": "เอาไว้กันลูกค้าบล็อกไลน์" }, ans: "ข", exp: "Tag + Targeted Broadcast = Personalization ที่นำไปสู่ยอดขายที่สูงขึ้น" },
        { q: "ในหน้า 'แดชบอร์ด (Dashboard)' ของ MyCustomer กราฟวงกลมแสดงสัดส่วนระหว่าง 'สมาชิกใหม่' กับ 'สมาชิกประจำ' แตกต่างกันอย่างไรในนิยามของระบบ?", choices: { "ก": "สมาชิกใหม่คือคนที่ซื้อของเยอะ สมาชิกประจำคือคนที่ซื้อของน้อย", "ข": "สมาชิกใหม่คือคนที่เพิ่งกดรับแต้มครั้งแรก ส่วนสมาชิกประจำคือผู้ที่มีประวัติการได้รับพอยท์ 'มากกว่า 1 ครั้งขึ้นไป'", "ค": "สมาชิกใหม่คือคนที่เพิ่งแอดไลน์", "ง": "สมาชิกประจำคือคนที่จ่ายเงินรายเดือนให้ร้าน" }, ans: "ข", exp: "นิยามของระบบใช้วัด Retention ว่าลูกค้ากลับมาปฏิสัมพันธ์ซ้ำหรือไม่" },
        { q: "ระบบ 'สเต็ปเมสเสจ (Step Message)' มีเงื่อนไขเริ่มต้น (Trigger) ที่เป็นที่นิยมที่สุดในการกระตุ้นยอดขายคือข้อใด?", choices: { "ก": "ส่งเมื่อลูกค้าเปลี่ยนรูปโปรไฟล์", "ข": "ส่งอัตโนมัติเมื่อลูกค้า 'เพิ่มเพื่อน (Add Friend)'", "ค": "ส่งเมื่อลูกค้าถูกติด Tag ว่าซื้อแล้ว", "ง": "ข. และ ค." }, ans: "ง", exp: "คำตอบที่ถูกต้องคือข้อ ข. และ ค. ตามเฉลยในเอกสาร" },
        { q: "ลูกค้าที่ 'บล็อก (Block)' บัญชี LINE OA ของเราไปแล้ว ร้านค้ายังมีโอกาสเข้าถึงลูกค้ากลุ่มนี้ได้ด้วยวิธีใด?", choices: { "ก": "บรอดแคสต์ข้อความปกติ", "ข": "โทรศัพท์ตามผ่านระบบ LINE Call", "ค": "ใช้ LINE Ads โดยสร้างกลุ่มเป้าหมาย (Audience) จาก 'เพื่อนที่บล็อก' เพื่อยิงโฆษณาดึงดูดด้วยโปรโมชั่นแรงๆ ให้กลับมาปลดบล็อก", "ง": "ให้ระบบส่งข้อความ SMS หาแทน" }, ans: "ค", exp: "เป็น Use case พิเศษของ LINE Ads ในการทำ Win-back campaign ดึงลูกค้าที่บล็อกให้กลับมาเป็นเพื่อน" },

        { q: "สถานการณ์ 6: ฝ่ายการตลาดต้องการบรอดแคสต์โปรโมชั่นคอลเลคชันใหม่ไปหาเฉพาะ 'ลูกค้า VIP' ที่ 'เคยซื้อรองเท้าผ้าใบ' การทำงานร่วมกันของเครื่องมือใดใน OA Chat Package ที่ทำให้แอดมินสามารถดึงฐานข้อมูลกลุ่มนี้มาทำ Targeted Broadcast ได้อย่างแม่นยำ?", choices: { "ก": "การใช้ Custom Filters กรองแชท แล้วส่งข้อความแบบ 1-on-1 เข้าไปทีละห้องแชท", "ข": "การติด Chat Tags คำว่า 'VIP' และ 'รองเท้าผ้าใบ' ไว้ที่ลูกค้าแต่ละรายล่วงหน้า และใช้แท็กเหล่านี้เป็นตัวคัดกรองกลุ่มเป้าหมายในขณะที่ตั้งค่าการบรอดแคสต์", "ค": "การเขียน 'VIP' ไว้ใน Note แล้วให้ AI Chatbot เป็นคนดึงข้อมูลส่งบรอดแคสต์", "ง": "การประเมินจาก Chat History 5 ปี แล้วบรอดแคสต์หาลูกค้าทุกคนที่มีคำว่ารองเท้า" }, ans: "ข", exp: "Chat Tag มีประโยชน์สูงสุดในการจัดกลุ่มลูกค้า เพื่อนำไปใช้เป็นเงื่อนไขในการทำ Targeted Broadcast ได้ตรงกลุ่มเป้าหมาย" },
        { q: "สถานการณ์ 9: ร้านขายเฟอร์นิเจอร์ต้องการเก็บ 'รูปแบบห้องที่ลูกค้าสนใจ' เพื่อทำโฆษณาบรอดแคสต์ และต้องการเก็บ 'รายละเอียดข้อจำกัดการขนส่งเข้าบ้านเชิงลึก' เพื่อให้ทีมจัดส่งอ่าน แอดมินควรเลือกใช้เครื่องมือใดบันทึกข้อมูลสองประเภทนี้?", choices: { "ก": "ใช้ Custom Filter เก็บ 'รูปแบบห้อง' และใช้ AI Chatbot เก็บ 'ข้อจำกัดขนส่ง'", "ข": "ใช้ Chat Tag เก็บ 'รูปแบบห้อง' และใช้ Note เก็บ 'ข้อจำกัดขนส่งเชิงลึก'", "ค": "ใช้ Note เก็บข้อมูลทั้งสองอย่าง เพราะ Note สามารถดึงข้อมูลไปทำบรอดแคสต์ได้", "ง": "ใช้ Chat Tag เก็บข้อมูลทั้งสองอย่าง เพราะแท็กสามารถพิมพ์ข้อความยาวๆ เป็นย่อหน้าได้" }, ans: "ข", exp: "Tag เหมาะกับคีย์เวิร์ดสั้นๆ เพื่อแยก Segment ทำการตลาด / Note เหมาะกับการจดรายละเอียดเชิงลึก (Long-text) ที่แอดมินหรือทีมจัดส่งต้องเข้ามาอ่าน" },
        { q: "สถานการณ์การบรอดแคสต์ 1: แบรนด์ต้องการประหยัดโควตาข้อความโดยการส่งข้อความย้ำเตือน (Follow-up) เฉพาะกลุ่มลูกค้าที่กดเข้าไปดูรายละเอียดสินค้าผ่านลิงก์ในข้อความบรอดแคสต์ก่อนหน้านี้ แอดมินควรเลือกสร้างกลุ่มเป้าหมายประเภทใด?", choices: { "ก": "อิมเพรสชันรีทาร์เก็ต (Impression Retargeting)", "ข": "คลิกรีทาร์เก็ต (Click Retargeting)", "ค": "กลุ่มเป้าหมายแชทแท็ก (Chat Tag Audience)", "ง": "อัปโหลด ID ผู้ใช้ (User ID Upload)" }, ans: "ข", exp: "คลิกรีทาร์เก็ต จะคัดกรองเฉพาะผู้ที่มี Action การ 'คลิกลิงก์' ในข้อความบรอดแคสต์ ซึ่งแสดงถึงความสนใจที่สูงกว่าคนที่แค่เปิดอ่านข้อความ" },
        { q: "สถานการณ์การบรอดแคสต์ 2: ทีมการตลาดต้องการกระตุ้นยอดขายช่วงสิ้นเดือน จึงอยากส่งบรอดแคสต์ไปหาลูกค้าที่ทีมแอดมินติดแท็กไว้ว่า 'รอเงินเดือนออก' ทีมการตลาดต้องทำอย่างไรจึงจะสะดวกรวดเร็วที่สุด?", choices: { "ก": "สร้าง 'กลุ่มเป้าหมายแชทแท็ก (Chat Tag Audience)' โดยดึงข้อมูลจากแท็ก 'รอเงินเดือนออก'", "ข": "สร้าง 'คลิกรีทาร์เก็ต' จากข้อความที่แอดมินคุยกับลูกค้าในห้องแชท", "ค": "ให้แอดมินเปิดดูห้องแชททีละคนแล้วใช้วิธีส่งข้อความแมนนวลเท่านั้น", "ง": "คัดลอกชื่อ Display Name ของลูกค้าทุกคนมาสร้างกลุ่มเป้าหมายใหม่" }, ans: "ก", exp: "กลุ่มเป้าหมายแชทแท็ก คือการนำข้อมูล Tag ที่แอดมินติดไว้ในห้องแชทตัวต่อตัว มาสร้างเป็น Audience เพื่อส่งบรอดแคสต์กลับไปหากลุ่มนั้นได้อย่างแม่นยำ" },
        { q: "สถานการณ์การบรอดแคสต์ 3: แอดมินอยู่ข้างนอกและพยายามสร้าง 'กลุ่มเป้าหมาย' บนแอปพลิเคชัน LINE Official Account ในมือถือแต่หาไม่พบ ปัญหานี้เกิดจากอะไร?", choices: { "ก": "แอปพลิเคชันยังไม่ได้อัปเดตเป็นเวอร์ชันล่าสุด", "ข": "บัญชี LINE OA ยังไม่ได้อัปเกรดเป็นบัญชีรับรอง", "ค": "การสร้างกลุ่มเป้าหมายทำได้เฉพาะบน 'LINE Official Account Manager' (ผ่านเว็บเบราว์เซอร์/คอมพิวเตอร์) เท่านั้น", "ง": "แอดมินต้องกดยืนยันการส่งบรอดแคสต์ออกไปก่อน 1 ครั้ง เมนูถึงจะปรากฏ" }, ans: "ค", exp: "ระบบไม่อนุญาตให้สร้างกลุ่มเป้าหมายผ่านแอปพลิเคชันจัดการบนมือถือ ต้องทำผ่านระบบหลังบ้าน (Manager) บนเว็บเบราว์เซอร์เท่านั้น" },
        { q: "สถานการณ์การบรอดแคสต์ 4: ร้านค้าตั้งใจจะนำกลุ่มเป้าหมาย 'อิมเพรสชันรีทาร์เก็ต' ที่สร้างไว้เมื่อ 7-8 เดือนก่อน มาใช้ยิงบรอดแคสต์อีกครั้ง แต่พบว่าไม่สามารถใช้งานได้ ข้อใดคือเหตุผล?", choices: { "ก": "กลุ่มเป้าหมาย (ยกเว้นแชทแท็ก) มีอายุการใช้งานจำกัดเพียง 180 วันนับจากวันที่สร้าง ข้อมูลกลุ่มนี้จึงหมดอายุไปแล้ว", "ข": "ลูกค้าในกลุ่มเป้าหมายนั้นกดบล็อก LINE OA ไปเกิน 50%", "ค": "ระบบ LINE OA ไม่อนุญาตให้ใช้กลุ่มเป้าหมายเดิมส่งบรอดแคสต์ซ้ำเกิน 1 ครั้ง", "ง": "อิมเพรสชันรีทาร์เก็ตจะใช้ได้กับแคมเปญที่มีชื่อตรงกันเท่านั้น" }, ans: "ก", exp: "กลุ่มเป้าหมายส่วนใหญ่ในระบบ LINE OA จะมีอายุการใช้งาน 180 วัน หากเกินจากนั้นจะไม่สามารถนำมาใช้งานได้ ต้องสร้างใหม่" },
        { q: "สถานการณ์การบรอดแคสต์ 5: บริษัทมีฐานข้อมูล 'ID ผู้ใช้ (User ID)' จากระบบที่เชื่อมต่อ LINE Login หากต้องการส่งข้อความบรอดแคสต์ไปหาเฉพาะลูกค้ากลุ่มนี้โดยใช้เพียงฐานข้อมูล User ID จะทำได้หรือไม่?", choices: { "ก": "ทำไม่ได้ เพราะการส่งบรอดแคสต์ต้องเลือกระบุจากเพศ อายุ หรือพื้นที่เท่านั้น", "ข": "ทำไม่ได้ เพราะ User ID เป็นข้อมูลหลังบ้านของฝั่ง Developer", "ค": "ทำได้ โดยการให้ลูกค้าส่ง User ID ของตนเองเข้ามาในแชท", "ง": "ทำได้ โดยแอดมินสามารถนำไฟล์ฐานข้อมูลนั้นมาสร้างกลุ่มเป้าหมายประเภท 'อัปโหลด ID ผู้ใช้' (User ID Upload)" }, ans: "ง", exp: "ระบบอนุญาตให้สร้างกลุ่มเป้าหมายด้วยการอัปโหลดไฟล์ User ID ที่ได้จากระบบ LINE Developers เพื่อนำมาระบุเป็นผู้รับข้อความบรอดแคสต์ได้อย่างแม่นยำ" }
    ];

    let timerInterval;
    let secondsElapsed = 0;
    let userName = "";
    let testDateStr = "";
    let wrongAnswersData = [];
    let essayAnswersData = [];
    let finalScore = 0;

    // ตั้งค่าวันที่ปัจจุบัน
    document.getElementById('test-date').valueAsDate = new Date();

    function formatTime(totalSeconds) {
        const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
        const s = (totalSeconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function startQuiz() {
        userName = document.getElementById('student-name').value.trim();
        testDateStr = document.getElementById('test-date').value;
        if(!userName) { alert('กรุณากรอกชื่อ-นามสกุลก่อนเริ่มทำข้อสอบ'); return; }

        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-quiz').classList.remove('hidden');
        renderQuestions();

        timerInterval = setInterval(() => {
            secondsElapsed++;
            document.getElementById('timer-display').innerText = `เวลา: ${formatTime(secondsElapsed)}`;
        }, 1000);
    }

    function renderQuestions() {
        const container = document.getElementById('quiz-container');
        let html = '<h3 class="section-title">ส่วนที่ 1: ปรนัย (เลือกคำตอบที่ถูกต้องที่สุด)</h3>';
        
        questionsData.forEach((item, index) => {
            html += `<div class="question-card"><p><strong>ข้อที่ ${index + 1}:</strong> ${item.q}</p>`;
            for (const [key, value] of Object.entries(item.choices)) {
                html += `<label class="choice-label"><input type="radio" name="q${index}" value="${key}"> ${key}. ${value}</label>`;
            }
            html += `</div>`;
        });

        if(essayQuestionsData.length > 0) {
            html += `<h3 class="section-title">ส่วนที่ 2: อัตนัย (พิมพ์คำตอบลงในช่องว่าง - รอ Manager ตรวจ)</h3>`;
            essayQuestionsData.forEach((item, index) => {
                html += `<div class="question-card"><p><strong>${item.q}</strong></p><textarea id="essay-q${index}" class="essay-textarea" placeholder="พิมพ์คำตอบของคุณที่นี่..."></textarea></div>`;
            });
        }
        container.innerHTML = html;
    }

    function submitQuiz() {
        if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการส่งคำตอบ?')) return;
        clearInterval(timerInterval);
        finalScore = 0;
        wrongAnswersData = [];
        essayAnswersData = [];

        questionsData.forEach((item, index) => {
            const selectedOpt = document.querySelector(`input[name="q${index}"]:checked`);
            const userAns = selectedOpt ? selectedOpt.value : "ไม่ได้ตอบ";
            if (userAns === item.ans) { finalScore++; } 
            else {
                wrongAnswersData.push({
                    qNum: index + 1, question: item.q, userAns: userAns,
                    userAnsText: userAns !== "ไม่ได้ตอบ" ? item.choices[userAns] : "-",
                    correctAns: item.ans, correctAnsText: item.choices[item.ans], explanation: item.exp
                });
            }
        });

        essayQuestionsData.forEach((item, index) => {
            const answerText = document.getElementById(`essay-q${index}`).value.trim();
            essayAnswersData.push({ qNum: index + 1, question: item.q, userAns: answerText || "ไม่ได้ตอบ" });
        });

        showResultScreen();
        sendDataToSheet();
    }

    function showResultScreen() {
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.remove('hidden');

        document.getElementById('result-summary').innerHTML = `
            ชื่อผู้สอบ: ${userName}<br>
            วันที่สอบ: ${testDateStr}<br>
            ใช้เวลาไป: ${formatTime(secondsElapsed)} นาที<br>
            คะแนนส่วนที่ 1 (ปรนัย): <span style="color:var(--primary-color); font-size: 24px;">${finalScore} / ${questionsData.length}</span>
        `;

        const wrongContainer = document.getElementById('wrong-answers-container');
        if (wrongAnswersData.length === 0) {
            wrongContainer.innerHTML = `<h3 style="color:var(--primary-color);">ยอดเยี่ยม! คุณตอบถูกทุกข้อในส่วนที่ 1 🎉</h3>`;
        } else {
            let html = `<h3>รายการข้อที่ตอบผิด (ส่วนที่ 1)</h3>`;
            wrongAnswersData.forEach(item => {
                html += `<div class="result-item"><p><strong>ข้อ ${item.qNum}:</strong> ${item.question}</p>
                    <p style="color: #c0392b;">❌ คำตอบของคุณ: ${item.userAns}. ${item.userAnsText}</p>
                    <div class="correct-ans">✅ เฉลยที่ถูกต้อง: ${item.correctAns}. ${item.correctAnsText}</div>
                    <div class="explanation">💡 <strong>คำอธิบาย:</strong> ${item.explanation}</div></div>`;
            });
            wrongContainer.innerHTML = html;
        }

        const essayContainer = document.getElementById('essay-answers-container');
        if(essayAnswersData.length > 0) {
            let html = `<h3 style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">ส่วนที่ 2: คำตอบแบบอัตนัย (รอ Manager ตรวจ)</h3>`;
            essayAnswersData.forEach(item => {
                html += `<div class="result-item essay-result"><p><strong>${item.question}</strong></p>
                    <p>📝 <strong>คำตอบของคุณ:</strong><br><span style="white-space: pre-wrap; display: block; padding-top: 10px; color: #333;">${item.userAns}</span></p></div>`;
            });
            essayContainer.innerHTML = html;
        }
    }

    function sendDataToSheet() {
        if (!scriptURL) return;

        let wrongDetailsText = wrongAnswersData.length > 0 ? wrongAnswersData.map(item => `ข้อ ${item.qNum}: ตอบ ${item.userAns}`).join(', ') : "ไม่มีข้อผิด";
        let essayDetailsText = essayAnswersData.length > 0 ? essayAnswersData.map(item => `${item.question}\n- ตอบ: ${item.userAns}`).join('\n\n') : "-";

        // แปลงข้อมูลเป็นรูปแบบฟอร์มเพื่อส่งเข้า Google Sheet โดยไม่ติดบล็อก
        const payload = new URLSearchParams();
        payload.append("name", userName);
        payload.append("date", testDateStr);
        payload.append("score", finalScore + "/" + questionsData.length);
        payload.append("wrong", wrongDetailsText);
        payload.append("essays", essayDetailsText);

        const retakeBtn = document.getElementById('btn-retake');
        retakeBtn.disabled = true;

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: payload.toString()
        }).finally(() => { retakeBtn.disabled = false; });
    }
</script>
</body>
</html>
